# Database (override via environment variables)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/fraud_detection}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# JPA
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Ensure schema.sql (wallet_topups table) runs on startup
spring.sql.init.mode=always
spring.sql.init.platform=postgres

# Server
server.port=${SERVER_PORT:8080}

# JWT (set a strong secret in production)
jwt.secret=${JWT_SECRET:change-me}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Flask AI Model URL
ai.model.url=${AI_MODEL_URL:http://localhost:5000/predict}

# Default admin seed (only created if ADMIN_PASSWORD is provided)
app.admin.email=${ADMIN_EMAIL:admin@fraudguard.com}
app.admin.password=${ADMIN_PASSWORD:}
app.default-user-balance=${DEFAULT_USER_BALANCE:200000}
app.admin.phone=${ADMIN_PHONE:}

# Risk policy + SLA
fraud.sla.high.minutes=${FRAUD_SLA_HIGH_MINUTES:5}
fraud.sla.medium.minutes=${FRAUD_SLA_MEDIUM_MINUTES:15}
fraud.sla.low.minutes=${FRAUD_SLA_LOW_MINUTES:30}
fraud.sla.scheduler.delay.ms=${FRAUD_SLA_SCHEDULER_DELAY_MS:30000}

# Medium-risk OTP policy
transaction.otp.expiry.minutes=${TRANSACTION_OTP_EXPIRY_MINUTES:5}
transaction.otp.expiry.seconds=${TRANSACTION_OTP_EXPIRY_SECONDS:90}
profile.phone.otp.expiry.minutes=${PROFILE_PHONE_OTP_EXPIRY_MINUTES:10}

# SMS provider integration (set real values in production)
app.sms.enabled=${APP_SMS_ENABLED:false}
app.sms.sender=${APP_SMS_SENDER:FraudGuard}
app.sms.provider.url=${APP_SMS_PROVIDER_URL:}
app.sms.provider.api-key=${APP_SMS_PROVIDER_API_KEY:}

# Free local OTP testing mode (no paid SMS dependency)
app.otp.dev-mode=${APP_OTP_DEV_MODE:true}
app.otp.show-in-response=${APP_OTP_SHOW_IN_RESPONSE:true}

# Mail (configure with real SMTP in production)
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html

# Logging
logging.level.com.example.frauddetectionsystem=DEBUG
